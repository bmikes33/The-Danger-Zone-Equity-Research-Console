name: Daily Dashboard Update (4pm CST)

on:
  schedule:
    - cron: '0 22 * * *'     # 4:00 PM CST every day (after market close)
  workflow_dispatch:         # click "Run workflow" anytime

permissions:
  contents: write            # <-- THIS FIXES EXIT CODE 128

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false   # prevents token caching issues

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install polygon-api-client requests

      - name: Run dashboard update script
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update_dashboard.py

      - name: Commit & push updated data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Auto-update: dashboard data @ $(date '+%Y-%m-%d %H:%M CST')" || echo "No changes to commit"
          git push
