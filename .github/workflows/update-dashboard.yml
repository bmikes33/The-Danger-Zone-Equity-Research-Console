name: Daily Dashboard Update (4pm CST)

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 4pm CST = 10pm UTC, weekdays only
  workflow_dispatch:  # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install polygon-api-client requests

      - name: Run dashboard update
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update_dashboard.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update data.json $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
