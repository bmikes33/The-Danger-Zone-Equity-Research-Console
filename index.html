function InstrumentModal({ name, onClose }) {
  const d = INSTRUMENT_DETAILS[name];
  if (!d) return null;
  const hasAnalysis = d.analysis && !d.analysis.includes("pending");
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 4 }}>
          <span style={{ fontSize: 24, fontWeight: 800, color: "#F1F5F9" }}>{name}</span>
          <span style={{ fontSize: 20, fontWeight: 700, color: "#F1F5F9" }}>{d.value}</span>
          <span style={{ fontSize: 14, fontWeight: 700, color: d.change?.startsWith("-") ? "#EF4444" : "#22C55E" }}>{d.change}</span>
        </div>
        <div style={{ fontSize: 12, fontWeight: 600, color: d.color, marginBottom: 16 }}>{d.signal}</div>

        {hasAnalysis ? (<>
          {d.chartUrl && <div style={{ marginBottom: 14, borderRadius: 8, overflow: "hidden", border: "1px solid #334155" }}><img src={d.chartUrl} alt={name + " chart"} style={{ width: "100%", display: "block" }} /></div>}
          {d.chartTime && <div style={{ fontSize: 11, color: "#64748B", marginBottom: 12 }}>Chart: {d.chartTime}</div>}
          {d.levels && (<div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 5 }}>Key Levels</div>
            <div style={{ fontSize: 12, color: "#CBD5E1", lineHeight: 1.6 }}>{d.levels}</div>
          </div>)}
          {d.indicators && (<div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 5 }}>Indicators</div>
            <div style={{ fontSize: 12, color: "#CBD5E1" }}>{d.indicators}</div>
          </div>)}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 5 }}>Technical Analysis</div>

                        background: "#FFF", border: "1px solid #E2E8F0", borderLeft: "3px solid "+k.color, borderRadius: 7, padding: "8px 12px",
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ fontSize: 10, color: "#94A3B8", fontWeight: 600 }}>{name}</div>
                          {hasDetail && <div style={{ width: 6, height: 6, borderRadius: 3, background: "#3B82F6" }} title="Chart analysis available" />}
                        </div>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 5, margin: "2px 0" }}>
                          <span style={{ fontSize: 16, fontWeight: 700, color: "#0F172A" }}>{k.value}</span>
                          <span style={{ fontSize: 11, fontWeight: 700, color: k.change?.startsWith("-") ? "#EF4444" : "#22C55E" }}>{k.change}</span>
                        </div>
                        <div style={{ fontSize: 10, color: k.color, fontWeight: 600 }}>{k.signal}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
            <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 6 }}>
              <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: 3, background: "#3B82F6", marginRight: 4 }}></span>
              Blue dot = chart analysis with TradingView snapshot available. Click any card.
            </div>
          </div>

          {/* Sectors */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#94A3B8", marginBottom: 8 }}>Sector Performance</div>
            <div style={{ background: "#FFF", border: "1px solid #E2E8F0", borderRadius: 9, overflow: "hidden" }}>
              {d.sectors.map((s,i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 14px", borderBottom: i<d.sectors.length-1 ? "1px solid #F1F5F9" : "none", background: i%2===0 ? "#FAFBFC" : "#FFF" }}>
                  <span style={{ fontSize: 12, color: "#334155" }}>{s.s}</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: s.clr, fontVariantNumeric: "tabular-nums" }}>{s.c}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Narrative */}
          <div style={{ background: "#0F172A", borderRadius: 10, padding: "16px 20px", marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 6 }}>Daily Summary</div>
            <p style={{ fontSize: 13, color: "#CBD5E1", lineHeight: 1.7, margin: 0 }}>{d.narrative}</p>
          </div>

          {/* Calendar */}
          <div style={{ background: "#FFF", border: "1px solid #E2E8F0", borderRadius: 9, overflow: "hidden" }}>
            <div style={{ background: "#1E293B", padding: "8px 14px", fontSize: 10, fontWeight: 700, color: "#94A3B8", letterSpacing: 1.5, textTransform: "uppercase" }}>Economic Calendar</div>
            {d.calendar.map((e,i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 14px", borderBottom: i<d.calendar.length-1 ? "1px solid #F1F5F9" : "none", background: e.i==="Critical" ? "#FEF2F2" : i%2===0 ? "#FAFBFC" : "#FFF" }}>
                <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#64748B", minWidth: 45 }}>{e.d}</span>
                  <span style={{ fontSize: 12, color: "#1E293B", fontWeight: e.i==="Critical" ? 700 : 400 }}>{e.e}</span>
                </div>
                <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", padding: "2px 7px", borderRadius: 3,
                  background: e.i==="Critical"?"#DC2626":e.i==="Position"?"#EFF6FF":"#F0FDF4",
                  color: e.i==="Critical"?"#FFF":e.i==="Position"?"#2563EB":"#16A34A"
                }}>{e.i}</span>
              </div>
            ))}
          </div>
        </div>)}

        {/* WATCHLIST */}
        {tab === "watchlist" && (<div>
          <h2 style={{ fontSize: 19, fontWeight: 800, color: "#0F172A", marginBottom: 14 }}>Active Watchlist</h2>
          {WATCHLIST.map(s => {
            const st = STG[s.stage]||{};
            const open = expStock === s.ticker;
            return (<div key={s.ticker} style={{ background:"#FFF", border:"1px solid #E2E8F0", borderRadius:11, marginBottom:10, overflow:"hidden", boxShadow: open?"0 4px 16px rgba(0,0,0,0.06)":"none" }}>
              <div onClick={() => setExpStock(open?null:s.ticker)} style={{ padding:"14px 18px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ width:40,height:40,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",background:st.bg,fontSize:18,border:"1px solid "+st.c+"30" }}>{st.i}</div>
                  <div>
                    <div style={{ display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                      <span style={{ fontSize:17,fontWeight:800,color:"#0F172A" }}>{s.ticker}</span>
                      <span style={{ fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:st.bg,color:st.c,textTransform:"uppercase",letterSpacing:0.5 }}>{s.stage}</span>
                      <span style={{ fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:s.sc+"12",color:s.sc }}>{s.status}</span>
                    </div>
                    <div style={{ fontSize:11,color:"#94A3B8",marginTop:2 }}>{s.company} · {s.sector}</div>
                  </div>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:16 }}>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:17,fontWeight:700,color:"#0F172A" }}>${s.price}</div>
                    <div style={{ fontSize:10,color:"#64748B" }}>Score: <b style={{ color:s.composite>=7?"#22C55E":"#F59E0B" }}>{s.composite}</b></div>
                  </div>
                  <span style={{ fontSize:16,color:"#94A3B8",transition:"transform 0.2s",transform:open?"rotate(180deg)":"none" }}>▾</span>
                </div>
              </div>
              {open && (<div style={{ padding:"0 18px 18px",borderTop:"1px solid #F1F5F9" }}>
                {s.macro && <div style={{ padding:"10px 12px",background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:7,margin:"12px 0",fontSize:12,color:"#166534" }}><b style={{ fontSize:10,letterSpacing:1,textTransform:"uppercase",color:"#16A34A" }}>Macro:</b> {s.macro}</div>}
                <div style={{ padding:"12px 0",borderBottom:"1px solid #F1F5F9" }}><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:5 }}>Thesis</div><p style={{ fontSize:13,color:"#334155",lineHeight:1.6,margin:0 }}>{s.thesis}</p></div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"12px 0",borderBottom:"1px solid #F1F5F9" }}>
                  {[["Entry",s.entry,"#22C55E"],["Stop",s.stop,"#EF4444"],["Targets",s.target,"#3B82F6"]].map(([l,v,c])=>(<div key={l}><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:3 }}>{l}</div><div style={{ fontSize:13,fontWeight:700,color:c }}>{v}</div></div>))}
                </div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,padding:"12px 0" }}>
                  <div><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:5 }}>Setup</div><p style={{ fontSize:12,color:"#475569",lineHeight:1.5,margin:0 }}>{s.setup}</p></div>
                  <div><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:5 }}>Catalysts</div><p style={{ fontSize:12,color:"#475569",lineHeight:1.5,margin:0 }}>{s.catalyst}</p><div style={{ marginTop:6,fontSize:11,color:"#64748B" }}>R:R — <b style={{ color:"#0F172A" }}>{s.rr}</b></div></div>
                </div>
                {s.research && <div style={{ marginTop:6,padding:"7px 10px",background:"#EFF6FF",borderRadius:5,fontSize:11,color:"#2563EB",fontWeight:600 }}>✓ Research report — see Research tab</div>}
              </div>)}
            </div>);
          })}
          <div style={{ marginTop:16,padding:"20px",border:"2px dashed #E2E8F0",borderRadius:10,textAlign:"center",color:"#94A3B8",fontSize:12 }}>More stocks added as we analyze them.</div>
        </div>)}

        {/* RESEARCH */}
        {tab === "research" && (<div>
          <h2 style={{ fontSize:19,fontWeight:800,color:"#0F172A",marginBottom:14 }}>Research Reports</h2>
          {REPORTS.map(r => {
            const st = STG[r.stage]||{};
            return (<div key={r.ticker} style={{ background:"#FFF",border:"1px solid #E2E8F0",borderRadius:11,overflow:"hidden",marginBottom:14 }}>
              <div style={{ padding:"14px 18px",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <div><div style={{ fontSize:18,fontWeight:800,color:"#0F172A" }}>{r.ticker} — {r.company}</div><div style={{ fontSize:11,color:"#94A3B8",marginTop:2 }}>{r.date}</div></div>
                <span style={{ fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:4,background:st.bg,color:st.c,textTransform:"uppercase",letterSpacing:0.5 }}>{r.stage}</span>
              </div>
              {r.sects.map((s,i) => {
                const k = r.ticker+"-"+i; const isOpen = expSect[k];
                return (<div key={i}>
                  <div onClick={() => setExpSect(p=>({...p,[k]:!p[k]}))} style={{ padding:"10px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:isOpen?"#F8FAFC":"#FFF",borderBottom:"1px solid #F1F5F9" }}>
                    <span style={{ fontSize:13,fontWeight:600,color:"#1E293B" }}>{s.t}</span>
                    <span style={{ fontSize:13,color:"#94A3B8",transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.15s" }}>▾</span>
                  </div>
                  {isOpen && <div style={{ padding:"12px 18px 16px",background:"#FAFBFC" }}><p style={{ fontSize:13,color:"#334155",lineHeight:1.7,margin:0 }}>{s.x}</p></div>}
                </div>);
              })}
            </div>);
          })}
        </div>)}

        {/* WORKFLOW */}
        {tab === "workflow" && (<div>
          <h2 style={{ fontSize:19,fontWeight:800,color:"#0F172A",marginBottom:14 }}>Research Workflow</h2>
          {[
            { p:"0",n:"Macro Regime",d:"Screenshot dashboard → Claude reads regime + vol charts",c:"#EF4444",s:"Active" },
            { p:"1",n:"Screening",d:"TradingView export → lifecycle valuation model (13,602 stocks)",c:"#F97316",s:"Complete" },
            { p:"2",n:"Selection",d:"Filter with macro bias → confirm stages & indicators",c:"#22C55E",s:"In Progress" },
            { p:"3",n:"Technical",d:"Chart screenshots → trade plans (entry/stop/targets)",c:"#8B5CF6",s:"Active" },
            { p:"4",n:"Deep Research",d:"SEC filings, analyst data, competitive landscape",c:"#3B82F6",s:"Active" },
            { p:"5",n:"Execution",d:"Trade, track, bring updated charts",c:"#EC4899",s:"Pending" },
          ].map((ph,i)=>(
            <div key={i} style={{ display:"flex",gap:14,padding:"14px 0",borderBottom:i<5?"1px solid #F1F5F9":"none" }}>
              <div style={{ width:38,height:38,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",background:ph.c+"12",color:ph.c,fontSize:15,fontWeight:800,flexShrink:0 }}>{ph.p}</div>
              <div>
                <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                  <span style={{ fontSize:14,fontWeight:700,color:"#0F172A" }}>{ph.n}</span>
                  <span style={{ fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:3,letterSpacing:0.5,
                    background:ph.s==="Complete"?"#F0FDF4":ph.s==="Active"?"#EFF6FF":ph.s==="In Progress"?"#FFF7ED":"#F8FAFC",
                    color:ph.s==="Complete"?"#16A34A":ph.s==="Active"?"#2563EB":ph.s==="In Progress"?"#EA580C":"#94A3B8"
                  }}>{ph.s}</span>
                </div>
                <div style={{ fontSize:12,color:"#64748B",marginTop:3 }}>{ph.d}</div>
              </div>
            </div>
          ))}
          <div style={{ marginTop:20,padding:"16px 18px",background:"#0F172A",borderRadius:10 }}>
            <div style={{ fontSize:12,fontWeight:700,color:"#F1F5F9",marginBottom:6 }}>How Updates Work</div>
            <div style={{ fontSize:11,color:"#94A3B8",lineHeight:1.8 }}>
              Updated through Claude chat. New index.html → replace in GitHub → live in 60s.
              <br/><span style={{color:"#EF4444"}}>•</span> Macro screenshots → regime + instrument analysis
              <br/><span style={{color:"#F97316"}}>•</span> New TradingView data → fresh screener
              <br/><span style={{color:"#22C55E"}}>•</span> Stock charts → updated trade plans
              <br/><span style={{color:"#3B82F6"}}>•</span> "Deep dive on X" → new research report
              <br/><span style={{color:"#EC4899"}}>•</span> "X hit target" → position management
            </div>
          </div>
        </div>)}
      </div>
      <div style={{ padding:"14px 20px",textAlign:"center",fontSize:10,color:"#94A3B8",borderTop:"1px solid #E2E8F0",marginTop:32 }}>Lifecycle Research · Not financial advice · {UPDATED}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
