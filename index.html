<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMB LLC Macro Research Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: #0B0F19; }
        button { font-family: inherit; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0F172A; border-radius: 14px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #94A3B8; font-size: 22px; cursor: pointer; }
        .inst-card { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
        .inst-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DATA_URL = "data.json";

const App = () => {
    const [dashboardData, setDashboardData] = React.useState(null);
    const [tab, setTab] = React.useState("macro");
    const [expStock, setExpStock] = React.useState(null);
    const [expSect, setExpSect] = React.useState({});

    useEffect(() => {
        fetch(DATA_URL)
            .then(r => r.json())
            .then(data => setDashboardData(data))
            .catch(err => console.error("Failed to load data.json", err));
    }, []);

    if (!dashboardData) {
        return React.createElement("div", { style: { padding: "40px", color: "#94A3B8", textAlign: "center" } },
            "Loading live dashboard data..."
        );
    }

    const UPDATED = dashboardData.updated || "March 30, 2026 — 4:30 PM CST";

    // Instrument helper
    const getInst = (key) => dashboardData.instruments[key] || { value: "N/A", change: "", signal: "", color: "#94A3B8", analysis: "" };

    return React.createElement("div", { style: { maxWidth: "1280px", margin: "0 auto", padding: "20px" } },
        // HEADER
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "24px" } },
            React.createElement("h1", { style: { fontSize: "28px", fontWeight: "800", color: "#F1F5F9" } }, "SMB LLC Macro Research Dashboard"),
            React.createElement("div", { style: { fontSize: "13px", color: "#64748B" } }, UPDATED)
        ),

        // TABS
        React.createElement("div", { style: { display: "flex", gap: "12px", marginBottom: "24px", borderBottom: "2px solid #1E293B", paddingBottom: "8px" } },
            React.createElement("button", {
                onClick: () => setTab("macro"),
                style: { padding: "8px 20px", borderRadius: "9999px", background: tab === "macro" ? "#3B82F6" : "#1E293B", color: tab === "macro" ? "#fff" : "#CBD5E1", fontWeight: "600" }
            }, "Macro Regime"),
            React.createElement("button", {
                onClick: () => setTab("watchlist"),
                style: { padding: "8px 20px", borderRadius: "9999px", background: tab === "watchlist" ? "#3B82F6" : "#1E293B", color: tab === "watchlist" ? "#fff" : "#CBD5E1", fontWeight: "600" }
            }, "Watchlist"),
            React.createElement("button", {
                onClick: () => setTab("research"),
                style: { padding: "8px 20px", borderRadius: "9999px", background: tab === "research" ? "#3B82F6" : "#1E293B", color: tab === "research" ? "#fff" : "#CBD5E1", fontWeight: "600" }
            }, "Research"),
            React.createElement("button", {
                onClick: () => setTab("workflow"),
                style: { padding: "8px 20px", borderRadius: "9999px", background: tab === "workflow" ? "#3B82F6" : "#1E293B", color: tab === "workflow" ? "#fff" : "#CBD5E1", fontWeight: "600" }
            }, "Workflow")
        ),

        // MACRO TAB (live data)
        tab === "macro" && React.createElement("div", {},
            // Instruments grid
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: "16px" } },
                Object.keys(dashboardData.instruments).map(key => {
                    const inst = getInst(key);
                    return React.createElement("div", {
                        key: key,
                        className: "inst-card",
                        style: {
                            background: "#131B2E",
                            border: `1px solid ${inst.color}30`,
                            borderRadius: "12px",
                            padding: "16px",
                            color: "#F1F5F9"
                        }
                    },
                        React.createElement("div", { style: { fontSize: "13px", fontWeight: "700", color: "#94A3B8", marginBottom: "4px" } }, key),
                        React.createElement("div", { style: { display: "flex", alignItems: "baseline", gap: "8px" } },
                            React.createElement("span", { style: { fontSize: "24px", fontWeight: "800" } }, inst.value),
                            React.createElement("span", { style: { fontSize: "15px", color: inst.change.startsWith("+") ? "#22C55E" : "#EF4444" } }, inst.change)
                        ),
                        React.createElement("div", { style: { fontSize: "12px", color: inst.color, marginTop: "8px", fontWeight: "600" } }, inst.signal)
                    );
                })
            ),

            // BMNR Put Ladder Monitor (special card)
            React.createElement("div", {
                style: {
                    marginTop: "24px",
                    background: "#1A2336",
                    borderRadius: "12px",
                    padding: "20px",
                    border: "2px solid #F97316"
                }
            },
                React.createElement("div", { style: { fontSize: "18px", fontWeight: "800", color: "#F97316", marginBottom: "12px" } }, "BMNR Short Put Ladder Monitor"),
                React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "24px" } },
                    React.createElement("div", {}, React.createElement("div", { style: { fontSize: "11px", color: "#94A3B8" } }, "Price"), React.createElement("div", { style: { fontSize: "28px", fontWeight: "700" } }, getInst("BMNR").value)),
                    React.createElement("div", {}, React.createElement("div", { style: { fontSize: "11px", color: "#94A3B8" } }, "IV Rank"), React.createElement("div", { style: { fontSize: "28px", fontWeight: "700", color: "#F97316" } }, getInst("BMNR").iv_rank || "85")),
                    React.createElement("div", {}, React.createElement("div", { style: { fontSize: "11px", color: "#94A3B8" } }, "Breakeven"), React.createElement("div", { style: { fontSize: "28px", fontWeight: "700" } }, getInst("BMNR").ladder_breakeven || "15% OTM"))
                ),
                React.createElement("div", { style: { marginTop: "16px", fontSize: "13px", color: "#CBD5E1", lineHeight: "1.5" } }, getInst("BMNR").analysis)
            ),

            // Sectors
            React.createElement("div", { style: { marginTop: "32px" } },
                React.createElement("div", { style: { fontSize: "13px", fontWeight: "700", color: "#94A3B8", marginBottom: "12px" } }, "Sector Performance"),
                React.createElement("div", { style: { background: "#131B2E", borderRadius: "12px", padding: "12px" } },
                    dashboardData.sectors.map((s, i) => React.createElement("div", {
                        key: i,
                        style: { display: "flex", justifyContent: "space-between", padding: "8px 16px", borderBottom: i < dashboardData.sectors.length - 1 ? "1px solid #1E293B" : "none" }
                    },
                        React.createElement("span", {}, s.s),
                        React.createElement("span", { style: { color: "#22C55E", fontWeight: "700" } }, s.c)
                    ))
                )
            )
        ),

        // Other tabs remain as-is (watchlist, research, workflow) — they are static for now
        // (You can expand them later with more data.json fields if needed)

        // FOOTER
        React.createElement("div", { style: { marginTop: "60px", textAlign: "center", fontSize: "12px", color: "#64748B" } },
            "SMB LLC Macro Research • Not financial advice • Auto-updated daily @ 4pm CST"
        )
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
