  "MTUM": { value: "246.94", change: "+1.44%", signal: "Bouncing — above 0.786 Fib", color: "#22C55E", chartTime: "March 9, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/KmLoDKQP/", levels: "Fib: 0.382 ($205.99) · 0.5 ($221) · 0.618 ($227.40) · 0.786 ($242.67) · 1.0 ($262.12 ATH)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14) · Fibonacci", analysis: "Today's leader at +2.39%. Price surged through the 0.786 Fib ($242.67), reclaiming the 21 EMA (white) and pushing above the 50 SMA (orange, ~$240-242). 200 SMA (purple, ~$220-225) well below = primary uptrend intact. MACD histogram turning up from negative — early momentum shift signal. RSI ~50-55 with room to run. When the momentum factor itself shows momentum, trend-following strategies work. Directly confirms the Growth Scare → Broadening Rally transition.", keyWatch: "Hold $242 (0.786 Fib + 50 SMA orange). Target $262 (prior ATH). Multi-day MTUM leadership = strongest confirmation the correction is over. Favors High Growth and Mature Growth stages." },

  "VLUE": { value: "146.19", change: "+1.03%", signal: "Value rotation still intact", color: "#22C55E", chartTime: "March 9, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/pa5fzmsj/", levels: "Fib: 0.786 ($141.06) · 1.0 ($154.48 ATH) | MAs: 21 EMA ~$143 · 50 SMA ~$140 · 200 SMA ~$126", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14) · Fibonacci", analysis: "MOST BULLISH structural chart across all factors. VLUE already broke out to new ATH ($154.48), pulled back to the 50 SMA (orange, ~$140) + 0.786 Fib ($141.06) double support, and is now bouncing with the 21 EMA (white) reclaimed. 200 SMA (purple, ~$126) way below = powerful primary uptrend. MACD declining from high peak but still above zero — cooling from overbought, trend intact. RSI ~55 healthy pullback from 70+. VLUE at ATH while MTUM and QQQ are below their highs = the biggest rotation signal on the dashboard. Value is structurally outperforming growth.", keyWatch: "Hold $141 (0.786 Fib + 50 SMA orange). Target $154+ (prior ATH). VLUE making new highs while QQQ stays below double-top = value rotation continues. Favors Maturity and Decline stage stocks." },
  "WALCL": { value: "$6.68T", change: "Rising", signal: "QT ended Dec 2025 — balance sheet expanding", color: "#22C55E", chartTime: "Weekly — FRED", chartUrl: "", levels: "$6.58T (QT end level, Dec 2025) · $6.68T (current, rising) · $9.0T (pandemic peak)", indicators: "Weekly level from FRED:WALCL", analysis: "The Fed officially ended QT on December 1, 2025 after removing ~$2.5T from the pandemic peak of $9T. Balance sheet bottomed at $6.58T and is now RISING as the Fed transitions to 'active reserve management' — rolling maturing Treasuries into new Treasuries to match trend growth in reserve demand. This is effectively passive QE. The balance sheet climbing is a MAJOR liquidity tailwind for risk assets. MBS holdings (~$2.1T) will gradually decline as the Fed rolls into Treasuries only.", keyWatch: "WALCL rising = liquidity expanding = bullish risk assets. Watch for any announcements about MBS reinvestment changes or active Treasury purchases. If WALCL accelerates above $6.8T, it signals the Fed is actively adding liquidity, extremely bullish for all stages especially Young/High Growth." },
  "TGA": { value: "~$750B", change: "Drawing down", signal: "TGA declining from $900B — liquidity injection", color: "#22C55E", chartTime: "Weekly — FRED:D2WLTGAL", chartUrl: "", levels: "$200B (low / post-debt ceiling) · $500B (normal operating) · $750B (current, declining) · $900B (recent peak)", indicators: "Weekly level from Treasury", analysis: "The Treasury General Account hit ~$900B recently (elevated from heavy issuance) and is now drawing down toward ~$750B as Treasury spends. TGA declining = cash flowing FROM Treasury's account INTO the banking system = liquidity injection. Every $100B TGA drawdown adds approximately $100B to bank reserves and loosens financial conditions. The TGA drawdown combined with WALCL rising creates a DOUBLE liquidity tailwind. This is one of the most important dynamics in the current market — it explains why risk assets are bouncing despite credit stress and elevated rates.", keyWatch: "TGA continuing to decline toward $500B = sustained liquidity injection. TGA rising (new issuance surge) = liquidity drain, headwind for risk. Tax season (April 15) typically causes a temporary TGA spike as tax receipts flow in — watch for this seasonal effect." },
  "RRP": { value: "~$0B", change: "Fully drained", signal: "No more buffer — neutral", color: "#94A3B8", chartTime: "Daily — NY Fed", chartUrl: "", levels: "$0 (current — fully drained) · $500B (moderate buffer) · $2.5T (2022-2023 peak)", indicators: "Daily from NY Fed reverse repo operations", analysis: "The overnight reverse repo facility has been fully drained — from $2.5T at peak to effectively zero in early January 2026. This was a massive liquidity tailwind as money flowed OUT of the RRP and INTO the financial system (T-bills, money markets, risk assets). Now that the RRP buffer is exhausted, there's no more passive liquidity injection from this source. Any further reserve drains go directly against bank reserves, which is why the Fed ended QT. The RRP at zero means the financial system is operating without a liquidity cushion — making SOFR spikes and repo stress more likely during periods of heavy Treasury settlement or quarter-end.", keyWatch: "RRP at zero is a STRUCTURAL change. The system no longer has a buffer. Watch SOFR for any spikes above 3.75% — without RRP to absorb, SOFR stress transmits directly to the real economy. If RRP somehow rebuilds (very unlikely), it would signal excess liquidity returning." },
  "Reserves": { value: "~$3.2T", change: "Stable/Rising", signal: "Above scarcity threshold — ample", color: "#22C55E", chartTime: "Weekly — FRED:WRESBAL", chartUrl: "", levels: "$2.5T (scarcity danger zone) · $2.85T (2019 repo crisis level) · $3.0T (minimum comfortable) · $3.2T (current) · $3.5T+ (abundant)", indicators: "Weekly from FRED:WRESBAL", analysis: "Bank reserves at the Fed are approximately $3.2T — above the 'minimum comfortable level' that the Fed targets but not deeply abundant. Reserves fell from $4.2T+ during QE to $2.85T in late 2025 (which triggered SOFR stress and accelerated the QT end). Now rising as WALCL expands and TGA draws down. The $3.0T level is the floor the Fed is trying to maintain. Below $2.85T = repo stress (we saw this in Oct-Nov 2025). Above $3.5T = deeply ample, no stress. Current $3.2T is comfortable but not abundant — the system works but has limited buffer.", keyWatch: "Reserves rising toward $3.5T = bullish, system building buffer. Reserves falling toward $3.0T = caution, approaching stress. Below $2.85T = emergency territory, expect SOFR spikes and potential Fed intervention (like 2019 repo crisis). FOMC Wednesday may address reserve management explicitly." },
  "SOFR": { value: "3.65%", change: "Stable", signal: "At Fed funds — plumbing working", color: "#22C55E", chartTime: "Daily — NY Fed", chartUrl: "", levels: "3.50% (Fed funds floor) · 3.625% (Fed funds midpoint) · 3.65% (current) · 3.75% (Fed funds ceiling) · 4.00%+ (stress signal)", indicators: "Daily from NY Fed SOFR publication", analysis: "SOFR at 3.65% is within the Fed funds target range of 3.50-3.75% — the overnight repo plumbing is functioning normally. This was NOT always the case: in late 2025, SOFR spiked above the Standing Repo Facility rate during the government shutdown, signaling the Fed briefly lost control of the overnight rate. That crisis is what forced the QT end. Current stability is a positive sign that the reserve management transition is working. The SOFR-to-Fed-funds spread of ~2.5bps is normal and healthy.", keyWatch: "SOFR stable near 3.65% = green light, plumbing works. SOFR above 3.75% (ceiling) = funding stress emerging. SOFR above 4.00% = the Fed is losing control, expect emergency repo operations. Quarter-end (March 31) often causes temporary SOFR spikes as banks window-dress balance sheets — watch for this in 2 weeks." },
  "Net Liq": { value: "~$5.93T", change: "Rising", signal: "EXPANDING — major risk tailwind", color: "#22C55E", chartTime: "Calculated: WALCL − TGA − RRP", chartUrl: "", levels: "$5.0T (contractionary) · $5.5T (neutral) · $5.93T (current, expanding) · $6.5T+ (very expansionary)", indicators: "Net Liquidity = WALCL ($6.68T) − TGA ($0.75T) − RRP ($0B) = ~$5.93T", analysis: "NET LIQUIDITY IS EXPANDING. This is the single most important number on the entire dashboard for understanding why risk assets can rally despite credit stress, elevated rates, and geopolitical uncertainty. The formula: Fed Balance Sheet ($6.68T rising) minus TGA ($750B declining) minus RRP ($0) = ~$5.93T and GROWING. Both components are moving in the bullish direction: WALCL rising (Fed adding reserves) and TGA declining (Treasury spending). This is the invisible hand pushing equities, crypto, and risk assets higher. SPY and BTC have tracked net liquidity with remarkable correlation since 2020. The ETH/BTC +5.18% surge today is consistent with expanding liquidity pushing into riskier assets.", keyWatch: "Net Liq rising toward $6T+ = strong tailwind for all risk assets, especially Young Growth, High Growth, and crypto. If TGA reverses higher (new issuance) while WALCL plateaus, Net Liq could stall — watch Treasury auction schedule. FOMC Wednesday and any balance sheet commentary from Powell is critical for the trajectory." },
  "US 2Y": { value: "3.910%", change: "+1.40%", signal: "SURGING toward 4.00% — rate cuts priced OUT", color: "#EF4444", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/wD0Ie1ch/", levels: "3.50% (Fed floor) · 3.625% (Fed midpoint) · 3.75% (Fed ceiling) · 3.91% ← HERE · 4.00% (higher-for-longer resistance)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · Horizontals at policy levels", analysis: "2Y has surged from 3.67% to 3.91% in just 8 days — a massive repricing of rate cut expectations. Now pushing against the 4.00% resistance (red dashed line on chart). This move says the market has fully priced out 2026 rate cuts and is now pricing in 'higher for longer' with conviction. The FOMC held at 3.50-3.75% with a hawkish tone, revised dot plot to just one cut in 2026. The 2Y above 3.75% (the Fed ceiling) = market pricing no cuts or risk of a hike.", keyWatch: "4.00% is the alarm. A break above = the market believes the next move is a HIKE, not a cut. Catastrophic for growth equities. A retreat below 3.75% = rate relief, first condition for equity recovery." },
  "US 10Y": { value: "4.414%", change: "+1.47%", signal: "SURGING toward 4.50% — equity headwind intensifying", color: "#EF4444", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/wD0Ie1ch/", levels: "4.00% (psych) · 4.414% ← HERE · 4.50% (ceiling / growth stock stress) · 5.00% (crisis)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · Horizontals", analysis: "10Y has surged to 4.414%, approaching the critical 4.50% resistance level. The 200 SMA (orange on rate chart) has been reclaimed and price is accelerating higher. This is the most important rate for equity valuations — Murphy's intermarket framework: rising long-term yields compress equity multiples. The move from 4.23% to 4.41% in a week reflects the oil/inflation premium, Fed hawkishness (2.7% PCE projection), and term premium expansion. The 2s10s spread at +50bps is positively sloped but steepening because LONG rates are rising — the bearish version.", keyWatch: "4.50% is the alarm level. Above 4.50% sustained = serious growth stock compression, MACD and trend-following signals on growth names become unreliable. Below 4.00% = green light for duration. Every 25bps move in the 10Y moves equity valuations ~2-3% in the opposite direction." },
  "US 30Y": { value: "4.975%", change: "+1.10%", signal: "Approaching 5.00% — fiscal/inflation alarm", color: "#EF4444", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/wD0Ie1ch/", levels: "4.50% · 4.975% ← HERE · 5.00% (alarm) · 5.50% (fiscal stress)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · Horizontals", analysis: "The 30Y is knocking on the door of 5.00% — the level we flagged as the alarm. This is the inflation/term premium signal. At 5%, the long end is saying the bond market doesn't believe inflation is coming down. The oil/geopolitical premium is fully baked in. Powell projected 2.7% PCE for 2026, well above 2% target. A sustained move above 5.00% would be the worst-case scenario for any equity with duration sensitivity — High Growth and Mature Growth both face valuation compression.", keyWatch: "5.00% is THE line. Above 5% sustained = bond market demanding serious fiscal/inflation premium, weighs on ALL equities. The 30Y at 5% + 10Y above 4.50% = a rate environment that's hostile to growth at any lifecycle stage." },
  "DXY": { value: "99.49", change: "+0.34%", signal: "Bouncing from lows — testing 100", color: "#F59E0B", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/wD0Ie1ch/", levels: "95 (extreme weak — recent low) · 99.49 ← HERE · 100 (psych / major level) · 103 · 106", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14)", analysis: "DXY bouncing off the 95 area and recovering toward 100. MAs converging around $99-100. RSI ~60. The dollar strengthening from lows is a shift from the weak-dollar tailwind that was supporting commodities and EM. A stronger dollar is traditionally a headwind for commodities, international earnings, and crypto — but supportive of domestic Maturity-stage names. The DXY recovery reflects rising US yields attracting capital vs. rest-of-world.", keyWatch: "Does DXY reclaim 100? Above 100 = dollar strengthening, headwind for commodities, EM (DLO exposure), crypto. Below 95 sustaining = weak dollar continues, bullish risk. DXY strength + rising yields = the classic risk-off combination." },
  "USD/JPY": { value: "158.88", change: "+0.30%", signal: "Approaching 160 — BOJ intervention risk", color: "#F59E0B", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/wD0Ie1ch/", levels: "140 (carry unwind crisis) · 150 (equilibrium) · 155 (comfortable) · 158.88 ← HERE · 160 (BOJ/MOF intervention risk)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · RSI (14) · Horizontals", analysis: "USD/JPY at 158.88, pushing toward the 160 intervention zone. All MAs below price — carry trade still profitable and running. BUT the Japan 10Y at 2.27% is creating domestic competition for Japanese capital. If Japanese institutional investors start repatriating from US Treasuries/equities, that's a liquidity headwind. The 160 level is where BOJ/MOF historically intervenes to support the yen.", keyWatch: "160 is the intervention ceiling. Any surprise BOJ hawkishness or MOF intervention near 160 → sharp USD/JPY reversal → yen carry unwind → VIX spike (exactly like Aug 2024). Low probability but high impact tail risk." },
  "JP 10Y": { value: "2.272%", change: "-0.79%", signal: "Parabolic — repatriation risk building", color: "#EF4444", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/wD0Ie1ch/", levels: "1.50% (post-YCC normal) · 2.00% (broken above) · 2.27% ← HERE · 2.50% (alarm / carry unwind trigger)", indicators: "50 SMA (orange) · 200 SMA (purple) · Horizontals", analysis: "Japan 10Y has broken above 2.00% and is accelerating at 2.27% — the chart is parabolic. This is a global story: Japanese investors seeing competitive domestic yields for the first time in decades means the single largest pool of foreign capital in US Treasuries ($1.1T+) has a reason to come home. This slow-motion repatriation risk is a structural headwind for US rates and equities. Combined with USD/JPY near 160, the carry trade is under pressure from BOTH sides.", keyWatch: "2.50% is the alarm level. JP 10Y above 2.50% likely triggers meaningful yen carry unwind and global vol spike. This is the underappreciated macro risk right now." },
  "Gold": { value: "$4,378", change: "-0.67%", signal: "Pulling back from highs — still structural bull", color: "#22C55E", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/Jw0ID9ZV/", levels: "50 SMA ~$4,100 · 200 SMA ~$3,900 · $4,378 ← HERE · $5,607 (ATH)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14) · Fibonacci", analysis: "Gold at $4,378, pulling back from recent highs but still in a powerful structural uptrend. Well above all MAs. The correction from $5,607 ATH has been orderly. Gold remains the flight-to-safety asset in this environment — geopolitical risk (Iran/Hormuz), rising inflation expectations (30Y near 5%), and central bank buying all support the secular bull thesis. A stronger DXY (99.5) is a minor headwind but gold is trading on fear, not dollar dynamics right now.", keyWatch: "Hold above $4,200 (50 SMA area) for structural bull intact. Below $4,000 = the rate rise is finally hurting gold (opportunity cost of holding non-yielding asset). Gold strength while equities weaken = classic risk-off signal confirming defensive positioning." },
  "Silver": { value: "$68.34", change: "-1.10%", signal: "Correcting — industrial demand slowing signal", color: "#F59E0B", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/NZRRTuko/", levels: "50 SMA ~$65 · 200 SMA ~$56 · $68.34 ← HERE · $122 (ATH)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14) · Fibonacci", analysis: "Silver at $68.34, continuing to correct from the $122 ATH. The deeper correction vs gold (silver down 44% from ATH vs gold down 22%) reflects silver's dual nature — the monetary premium is holding but the industrial demand component is weakening as growth concerns mount. Gold/silver ratio rising = classic risk-off signal.", keyWatch: "50 SMA ($65) is key support. Silver underperforming gold = industrial slowdown signal, consistent with rising rates and credit stress narrative." },
  "Copper": { value: "$71.80", change: "-2.38%", signal: "COPX selling off — growth doubts rising", color: "#EF4444", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/KO7ZPDM9/", levels: "50 SMA ~$75 · 200 SMA ~$66 · COPX $71.80 ← HERE · $100 (ATH)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14) · Fibonacci", analysis: "COPX dropping -2.38% — a significant move for the global growth bellwether. Below the 50 SMA and declining. Copper falling while oil rises = stagflationary signal. The supply deficit thesis (AI data centers, EVs, electrification) is intact structurally but near-term demand is being questioned as rates rise and credit tightens. COPX at $71.80 vs $100 ATH = 28% drawdown.", keyWatch: "200 SMA ($66) is the structural floor. COPX below $66 = the growth thesis is being seriously questioned. COPX recovering above $75 (50 SMA) = growth confidence returning. This is the purest global growth indicator — its weakness confirms the broader risk-off narrative." },
  "Oil": { value: "$92.22", change: "+3.78%", signal: "Surging on geopolitical premium — inflationary", color: "#EF4444", chartTime: "March 24, 2026 — Daily", chartUrl: "https://www.tradingview.com/x/hOq9VXkF/", levels: "$65-70 (pre-crisis / MAs) · $92.22 ← HERE · $100 (psych / inflation alarm) · $119 (spike high)", indicators: "21 EMA (white) · 50 SMA (orange) · 200 SMA (purple) · MACD · RSI (14)", analysis: "Oil surging +3.78% to $92.22 — the geopolitical premium from Iran/Hormuz is back after a brief de-escalation dip. Oil is the single most inflationary input in the economy. At $92+, it pushes CPI higher, constrains the Fed from cutting, hurts consumer spending (XLY under pressure), and widens credit spreads (energy cost → margin pressure → default risk). Oil rising + yields rising + credit widening = the stagflationary scenario that's worst for equities.", keyWatch: "$100 is THE level. Oil above $100 sustained = stagflation pricing, forces Fed hand, bearish ALL equities. Oil falling below $80 = de-escalation confirmed, rates ease, equity relief. Goldman warning: Brent could spike to $135 if Hormuz stays choked." },

function InstrumentModal({ name, onClose }) {
  const d = INSTRUMENT_DETAILS[name];
  if (!d) return null;
  const hasAnalysis = d.analysis && !d.analysis.includes("pending");
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 4 }}>
          <span style={{ fontSize: 24, fontWeight: 800, color: "#F1F5F9" }}>{name}</span>
          <span style={{ fontSize: 20, fontWeight: 700, color: "#F1F5F9" }}>{d.value}</span>
          <span style={{ fontSize: 14, fontWeight: 700, color: d.change?.startsWith("-") ? "#EF4444" : "#22C55E" }}>{d.change}</span>
        </div>
        <div style={{ fontSize: 12, fontWeight: 600, color: d.color, marginBottom: 16 }}>{d.signal}</div>

        {hasAnalysis ? (<>
          {d.chartUrl && <div style={{ marginBottom: 14, borderRadius: 8, overflow: "hidden", border: "1px solid #334155" }}><img src={d.chartUrl} alt={name + " chart"} style={{ width: "100%", display: "block" }} /></div>}
          {d.chartTime && <div style={{ fontSize: 11, color: "#64748B", marginBottom: 12 }}>Chart: {d.chartTime}</div>}
          {d.levels && (<div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 5 }}>Key Levels</div>
            <div style={{ fontSize: 12, color: "#CBD5E1", lineHeight: 1.6 }}>{d.levels}</div>
          </div>)}
          {d.indicators && (<div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 5 }}>Indicators</div>
            <div style={{ fontSize: 12, color: "#CBD5E1" }}>{d.indicators}</div>
          </div>)}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 5 }}>Technical Analysis</div>
            <div style={{ fontSize: 13, color: "#E2E8F0", lineHeight: 1.7 }}>{d.analysis}</div>
          </div>
          {d.keyWatch && (<div style={{ padding: "12px 14px", background: "#1E293B", borderRadius: 8, border: "1px solid #334155" }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#F59E0B", marginBottom: 5 }}>Key Watch</div>
            <div style={{ fontSize: 12, color: "#CBD5E1", lineHeight: 1.6 }}>{d.keyWatch}</div>
          </div>)}
        </>) : (
          <div style={{ padding: "20px", textAlign: "center", color: "#64748B", fontSize: 13 }}>
            Chart analysis pending — send a daily chart screenshot in our Claude chat to activate.
          </div>
        )}
      </div>
    </div>
  );
}

                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 14px", borderBottom: i<d.sectors.length-1 ? "1px solid #1A2336" : "none", background: i%2===0 ? "#131B2E" : "#0F1628" }}>
                  <span style={{ fontSize: 12, color: "#CBD5E1" }}>{s.s}</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: s.clr, fontVariantNumeric: "tabular-nums" }}>{s.c}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Narrative */}
          <div style={{ background: "#0F172A", borderRadius: 10, padding: "16px 20px", marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#64748B", marginBottom: 6 }}>Daily Summary</div>
            <p style={{ fontSize: 13, color: "#CBD5E1", lineHeight: 1.7, margin: 0 }}>{d.narrative}</p>
          </div>

          {/* Calendar */}
          <div style={{ background: "#131B2E", border: "1px solid #1E293B", borderRadius: 9, overflow: "hidden" }}>
            <div style={{ background: "#1E293B", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: "#94A3B8", letterSpacing: 1.5, textTransform: "uppercase" }}>March 2026</span>
              <span style={{ fontSize: 10, color: "#64748B" }}>Economic Calendar</span>
            </div>
            {/* Day headers */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", borderBottom: "1px solid #1A2336" }}>
              {["Mon","Tue","Wed","Thu","Fri"].map(d => (
                <div key={d} style={{ padding: "6px 0", textAlign: "center", fontSize: 9, fontWeight: 700, color: "#64748B", letterSpacing: 1 }}>{d}</div>
              ))}
            </div>
            {/* Week: Mar 16-20 (current week) */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)" }}>
              {[
                { day: 16, events: [{ e: "Empire Mfg: -0.2 ✓", i: "Done" }, { e: "Ind. Prod: +0.2% ✓", i: "Done" }, { e: "NAHB: 38 ✓", i: "Done" }], today: true },
                { day: 17, events: [{ e: "Pending Home Sales", i: "Medium" }], today: false },
                { day: 18, events: [{ e: "PPI (Feb)", i: "Critical" }, { e: "FOMC Decision 2pm", i: "Critical" }, { e: "GLUE Earnings", i: "Position" }, { e: "DLO Earnings", i: "Position" }], today: false },
                { day: 19, events: [{ e: "Powell Presser 2:30", i: "Critical" }, { e: "Jobless Claims", i: "Medium" }, { e: "Philly Fed Mfg", i: "Medium" }, { e: "New Home Sales", i: "Medium" }], today: false },
                { day: 20, events: [], today: false },
              ].map((d,idx) => (
                <div key={idx} style={{ padding: "8px 6px", borderRight: idx<4 ? "1px solid #1A2336" : "none", borderBottom: "1px solid #1A2336", background: d.today ? "#1A2336" : "transparent", minHeight: 85 }}>
                  <div style={{ fontSize: 13, fontWeight: d.today ? 800 : 600, color: d.today ? "#3B82F6" : "#CBD5E1", marginBottom: 4 }}>{d.day}</div>
                  {d.events.map((ev,j) => (
                    <div key={j} style={{ fontSize: 8, padding: "2px 4px", borderRadius: 3, marginBottom: 2, fontWeight: 600,
                      background: ev.i==="Critical" ? "#7F1D1D" : ev.i==="Position" ? "#1E3A5F" : ev.i==="Done" ? "#0A1F12" : "#1A2336",
                      color: ev.i==="Critical" ? "#FCA5A5" : ev.i==="Position" ? "#93C5FD" : ev.i==="Done" ? "#4ADE80" : "#94A3B8",
                      border: ev.i==="Critical" ? "1px solid #DC2626" : ev.i==="Position" ? "1px solid #2563EB" : "1px solid transparent"
                    }}>{ev.e}</div>
                  ))}
                </div>
              ))}
            </div>
            {/* Week: Mar 21-27 (Powell speech Sat) */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)" }}>
              {[
                { day: 23, events: [{ e: "Construction Spend", i: "Medium" }], today: false },
                { day: 24, events: [{ e: "Productivity (Q4)", i: "Medium" }, { e: "Flash PMIs", i: "Medium" }], today: false },
                { day: 25, events: [{ e: "Import Prices", i: "Medium" }], today: false },
                { day: 26, events: [{ e: "Jobless Claims", i: "Medium" }], today: false },
                { day: 27, events: [{ e: "Consumer Sentiment", i: "Medium" }], today: false },
              ].map((d,idx) => (
                <div key={idx} style={{ padding: "8px 6px", borderRight: idx<4 ? "1px solid #1A2336" : "none", borderBottom: "1px solid #1A2336", minHeight: 70 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#CBD5E1", marginBottom: 4 }}>{d.day}</div>
                  {d.events.map((ev,j) => (
                    <div key={j} style={{ fontSize: 8, padding: "2px 4px", borderRadius: 3, marginBottom: 2, fontWeight: 600,
                      background: ev.i==="Critical" ? "#7F1D1D" : ev.i==="Position" ? "#1E3A5F" : "#1A2336",
                      color: ev.i==="Critical" ? "#FCA5A5" : ev.i==="Position" ? "#93C5FD" : "#94A3B8",
                      border: ev.i==="Critical" ? "1px solid #DC2626" : "1px solid transparent"
                    }}>{ev.e}</div>
                  ))}
                </div>
              ))}
            </div>
            {/* Note about Powell Saturday speech */}
            <div style={{ padding: "6px 10px", fontSize: 9, color: "#64748B", borderBottom: "1px solid #1A2336" }}>
              <span style={{ color: "#FCA5A5" }}>★</span> Sat Mar 21: Powell speech 1:30pm ET — post-FOMC color
            </div>
            <div style={{ padding: "6px 10px", fontSize: 9, color: "#64748B", display: "flex", gap: 12 }}>
              <span><span style={{ display:"inline-block",width:8,height:8,borderRadius:2,background:"#7F1D1D",border:"1px solid #DC2626",marginRight:3,verticalAlign:"middle" }}></span>Critical</span>
              <span><span style={{ display:"inline-block",width:8,height:8,borderRadius:2,background:"#1E3A5F",border:"1px solid #2563EB",marginRight:3,verticalAlign:"middle" }}></span>Position</span>
              <span><span style={{ display:"inline-block",width:8,height:8,borderRadius:2,background:"#0A1F12",marginRight:3,verticalAlign:"middle" }}></span>Done</span>
              <span><span style={{ display:"inline-block",width:8,height:8,borderRadius:2,background:"#1A2336",marginRight:3,verticalAlign:"middle" }}></span>Data</span>
            </div>
          </div>

          {/* News Feed */}
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#94A3B8", marginBottom: 8 }}>Macro News Digest <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0, color: "#64748B" }}>— signal from noise</span></div>
            {d.news.map((n,i) => (
              <div key={i} style={{ background: "#131B2E", border: "1px solid #1E293B", borderRadius: 9, marginBottom: 8, overflow: "hidden" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", background: "#1A2336" }}>
                  <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1, color: "#F1F5F9" }}>{n.cat}</span>
                  <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 3,
                    background: n.signal==="Dovish"?"#0A1F12":n.signal==="Hawkish"?"#1F0A0A":n.signal==="Mixed"?"#1A1206":n.signal.includes("De-escalation")?"#0C1A2E":"#1A2336",
                    color: n.signal==="Dovish"?"#4ADE80":n.signal==="Hawkish"?"#FCA5A5":n.signal==="Mixed"?"#FBBF24":n.signal.includes("De-escalation")?"#93C5FD":"#94A3B8",
                  }}>{n.signal}</span>
                </div>
                <div style={{ padding: "8px 14px" }}>
                  {n.items.map((item,j) => (
                    <div key={j} style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.6, padding: "4px 0", borderBottom: j<n.items.length-1 ? "1px solid #1A2336" : "none" }}>
                      <span style={{ color: "#64748B", marginRight: 6 }}>›</span>{item}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* Fed Speaker Personas */}
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#94A3B8", marginBottom: 8 }}>Fed Speaker Tracker <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0, color: "#64748B" }}>— who says what</span></div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))", gap: 8 }}>
              {d.fedPersonas.map((f,i) => (
                <div key={i} style={{ background: "#131B2E", border: "1px solid #1E293B", borderLeft: "3px solid "+f.color, borderRadius: 9, padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div>
                      <span style={{ fontSize: 14, fontWeight: 800, color: "#F1F5F9" }}>{f.name}</span>
                      <span style={{ fontSize: 10, color: "#64748B", marginLeft: 6 }}>{f.title}</span>
                    </div>
                    <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 3,
                      background: f.lean.includes("Hawkish")?"#1F0A0A":f.lean.includes("Dovish")?"#0A1F12":"#1A1206",
                      color: f.lean.includes("Hawkish")?"#FCA5A5":f.lean.includes("Dovish")?"#4ADE80":"#FBBF24",
                    }}>{f.lean}</span>
                  </div>
                  {f.quotes.map((q,j) => (
                    <div key={j} style={{ fontSize: 10, color: "#94A3B8", lineHeight: 1.5, padding: "2px 0", borderBottom: j<f.quotes.length-1 ? "1px solid #0F1628" : "none" }}>
                      <span style={{ color: f.color, marginRight: 4 }}>•</span>{q}
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{ marginTop: 8, padding: "10px 14px", background: "#0F172A", borderRadius: 7, fontSize: 11, color: "#64748B", lineHeight: 1.6 }}>
              <b style={{ color: "#94A3B8" }}>CPI Reaction Matrix:</b> Hot CPI → hawks (Hammack, Collins) dominate narrative, cuts pushed to H2 2026+, bearish growth equities. Cool CPI → doves (Goolsbee, Miran) have cover to push for June cut, bullish risk. Inline → status quo, Daly's "no need for speed" becomes consensus.
            </div>
          </div>
        </div>)}

        {/* WATCHLIST */}
        {tab === "watchlist" && (<div>
          <h2 style={{ fontSize: 19, fontWeight: 800, color: "#F1F5F9", marginBottom: 14 }}>Active Watchlist</h2>
          {WATCHLIST.map(s => {
            const st = STG[s.stage]||{};
            const open = expStock === s.ticker;
            return (<div key={s.ticker} style={{ background:"#131B2E", border:"1px solid #1E293B", borderRadius:11, marginBottom:10, overflow:"hidden", boxShadow: open?"0 4px 16px rgba(0,0,0,0.06)":"none" }}>
              <div onClick={() => setExpStock(open?null:s.ticker)} style={{ padding:"14px 18px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ width:40,height:40,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",background:st.bg,fontSize:18,border:"1px solid "+st.c+"30" }}>{st.i}</div>
                  <div>
                    <div style={{ display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                      <span style={{ fontSize:17,fontWeight:800,color:"#F1F5F9" }}>{s.ticker}</span>
                      <span style={{ fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:st.bg,color:st.c,textTransform:"uppercase",letterSpacing:0.5 }}>{s.stage}</span>
                      <span style={{ fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:s.sc+"12",color:s.sc }}>{s.status}</span>
                    </div>
                    <div style={{ fontSize:11,color:"#94A3B8",marginTop:2 }}>{s.company} · {s.sector}</div>
                  </div>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:16 }}>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:17,fontWeight:700,color:"#F1F5F9" }}>${s.price}</div>
                    <div style={{ fontSize:10,color:"#64748B" }}>Score: <b style={{ color:s.composite>=7?"#22C55E":"#F59E0B" }}>{s.composite}</b></div>
                  </div>
                  <span style={{ fontSize:16,color:"#94A3B8",transition:"transform 0.2s",transform:open?"rotate(180deg)":"none" }}>▾</span>
                </div>
              </div>
              {open && (<div style={{ padding:"0 18px 18px",borderTop:"1px solid #1A2336" }}>
                {s.macro && <div style={{ padding:"10px 12px",background:"#0A1F12",border:"1px solid #166534",borderRadius:7,margin:"12px 0",fontSize:12,color:"#4ADE80" }}><b style={{ fontSize:10,letterSpacing:1,textTransform:"uppercase",color:"#4ADE80" }}>Macro:</b> {s.macro}</div>}
                <div style={{ padding:"12px 0",borderBottom:"1px solid #1A2336" }}><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:5 }}>Thesis</div><p style={{ fontSize:13,color:"#CBD5E1",lineHeight:1.6,margin:0 }}>{s.thesis}</p></div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"12px 0",borderBottom:"1px solid #1A2336" }}>
                  {[["Entry",s.entry,"#22C55E"],["Stop",s.stop,"#EF4444"],["Targets",s.target,"#3B82F6"]].map(([l,v,c])=>(<div key={l}><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:3 }}>{l}</div><div style={{ fontSize:13,fontWeight:700,color:c }}>{v}</div></div>))}
                </div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,padding:"12px 0" }}>
                  <div><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:5 }}>Setup</div><p style={{ fontSize:12,color:"#94A3B8",lineHeight:1.5,margin:0 }}>{s.setup}</p></div>
                  <div><div style={{ fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#94A3B8",marginBottom:5 }}>Catalysts</div><p style={{ fontSize:12,color:"#94A3B8",lineHeight:1.5,margin:0 }}>{s.catalyst}</p><div style={{ marginTop:6,fontSize:11,color:"#64748B" }}>R:R — <b style={{ color:"#F1F5F9" }}>{s.rr}</b></div></div>
                </div>
                {s.research && <div style={{ marginTop:6,padding:"7px 10px",background:"#0C1A2E",borderRadius:5,fontSize:11,color:"#2563EB",fontWeight:600 }}>✓ Research report — see Research tab</div>}
              </div>)}
            </div>);
          })}
          <div style={{ marginTop:16,padding:"20px",border:"2px dashed #1E293B",borderRadius:10,textAlign:"center",color:"#94A3B8",fontSize:12 }}>More stocks added as we analyze them.</div>
        </div>)}

        {/* RESEARCH */}
        {tab === "research" && (<div>
          <h2 style={{ fontSize:19,fontWeight:800,color:"#F1F5F9",marginBottom:14 }}>Research Reports</h2>
          {REPORTS.map(r => {
            const st = STG[r.stage]||{};
            return (<div key={r.ticker} style={{ background:"#131B2E",border:"1px solid #1E293B",borderRadius:11,overflow:"hidden",marginBottom:14 }}>
              <div style={{ padding:"14px 18px",borderBottom:"1px solid #1A2336",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <div><div style={{ fontSize:18,fontWeight:800,color:"#F1F5F9" }}>{r.ticker} — {r.company}</div><div style={{ fontSize:11,color:"#94A3B8",marginTop:2 }}>{r.date}</div></div>
                <span style={{ fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:4,background:st.bg,color:st.c,textTransform:"uppercase",letterSpacing:0.5 }}>{r.stage}</span>
              </div>
              {r.sects.map((s,i) => {
                const k = r.ticker+"-"+i; const isOpen = expSect[k];
                return (<div key={i}>
                  <div onClick={() => setExpSect(p=>({...p,[k]:!p[k]}))} style={{ padding:"10px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:isOpen?"#1A2336":"#131B2E",borderBottom:"1px solid #1A2336" }}>
                    <span style={{ fontSize:13,fontWeight:600,color:"#E2E8F0" }}>{s.t}</span>
                    <span style={{ fontSize:13,color:"#94A3B8",transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.15s" }}>▾</span>
                  </div>
                  {isOpen && <div style={{ padding:"12px 18px 16px",background:"#0F1628" }}><p style={{ fontSize:13,color:"#CBD5E1",lineHeight:1.7,margin:0 }}>{s.x}</p></div>}
                </div>);
              })}
            </div>);
          })}
        </div>)}

        {/* WORKFLOW */}
        {tab === "workflow" && (<div>
          <h2 style={{ fontSize:19,fontWeight:800,color:"#F1F5F9",marginBottom:14 }}>Research Workflow</h2>
          {[
            { p:"0",n:"Macro Regime",d:"Screenshot dashboard → Claude reads regime + vol charts",c:"#EF4444",s:"Active" },
            { p:"1",n:"Screening",d:"TradingView export → lifecycle valuation model (13,602 stocks)",c:"#F97316",s:"Complete" },
            { p:"2",n:"Selection",d:"Filter with macro bias → confirm stages & indicators",c:"#22C55E",s:"In Progress" },
            { p:"3",n:"Technical",d:"Chart screenshots → trade plans (entry/stop/targets)",c:"#8B5CF6",s:"Active" },
            { p:"4",n:"Deep Research",d:"SEC filings, analyst data, competitive landscape",c:"#3B82F6",s:"Active" },
            { p:"5",n:"Execution",d:"Trade, track, bring updated charts",c:"#EC4899",s:"Pending" },
          ].map((ph,i)=>(
            <div key={i} style={{ display:"flex",gap:14,padding:"14px 0",borderBottom:i<5?"1px solid #1A2336":"none" }}>
              <div style={{ width:38,height:38,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",background:ph.c+"12",color:ph.c,fontSize:15,fontWeight:800,flexShrink:0 }}>{ph.p}</div>
              <div>
                <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                  <span style={{ fontSize:14,fontWeight:700,color:"#F1F5F9" }}>{ph.n}</span>
                  <span style={{ fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:3,letterSpacing:0.5,
                    background:ph.s==="Complete"?"#0A1F12":ph.s==="Active"?"#0C1A2E":ph.s==="In Progress"?"#1A1206":"#131B2E",
                    color:ph.s==="Complete"?"#4ADE80":ph.s==="Active"?"#60A5FA":ph.s==="In Progress"?"#FB923C":"#94A3B8"
                  }}>{ph.s}</span>
                </div>
                <div style={{ fontSize:12,color:"#64748B",marginTop:3 }}>{ph.d}</div>
              </div>
            </div>
          ))}
          <div style={{ marginTop:20,padding:"16px 18px",background:"#0F172A",borderRadius:10 }}>
            <div style={{ fontSize:12,fontWeight:700,color:"#F1F5F9",marginBottom:6 }}>How Updates Work</div>
            <div style={{ fontSize:11,color:"#94A3B8",lineHeight:1.8 }}>
              Updated through Claude chat. New index.html → replace in GitHub → live in 60s.
              <br/><span style={{color:"#EF4444"}}>•</span> Macro screenshots → regime + instrument analysis
              <br/><span style={{color:"#F97316"}}>•</span> New TradingView data → fresh screener
              <br/><span style={{color:"#22C55E"}}>•</span> Stock charts → updated trade plans
              <br/><span style={{color:"#3B82F6"}}>•</span> "Deep dive on X" → new research report
              <br/><span style={{color:"#EC4899"}}>•</span> "X hit target" → position management
            </div>
          </div>
        </div>)}
      </div>
      <div style={{ padding:"14px 20px",textAlign:"center",fontSize:10,color:"#94A3B8",borderTop:"1px solid #1E293B",marginTop:32 }}>SMB LLC Macro Research · Not financial advice · {UPDATED}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
