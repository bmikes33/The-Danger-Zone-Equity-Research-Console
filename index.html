                    <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 2 }}>Research Report · {r.date}</div>
                  </div>
                  <span style={{ fontSize: 9, fontWeight: 700, padding: "3px 8px", borderRadius: 4, background: st.bg, color: st.c, textTransform: "uppercase", letterSpacing: 0.5 }}>{r.stage}</span>
                </div>
                {r.sections.map((s, i) => {
                  const key = r.ticker + "-" + i;
                  const isOpen = expandedSection[key];
                  return (
                    <div key={i}>
                      <div onClick={() => setExpandedSection(prev => ({...prev, [key]: !prev[key]}))} style={{ padding: "10px 18px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", background: isOpen ? "#F8FAFC" : "#FFF", borderBottom: "1px solid #F1F5F9" }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#1E293B" }}>{s.title}</span>
                        <span style={{ fontSize: 13, color: "#94A3B8", transform: isOpen ? "rotate(180deg)" : "none", transition: "transform 0.15s" }}>▾</span>
                      </div>
                      {isOpen && <div style={{ padding: "12px 18px 16px", background: "#FAFBFC" }}><p style={{ fontSize: 13, color: "#334155", lineHeight: 1.7, margin: 0 }}>{s.text}</p></div>}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>)}

        {/* ==================== WORKFLOW ==================== */}
        {tab === "workflow" && (<div>
          <h2 style={{ fontSize: 19, fontWeight: 800, color: "#0F172A", marginBottom: 14 }}>Research Workflow</h2>
          {[
            { p: "0", n: "Macro Regime", d: "Screenshot macro dashboard → Claude reads the room, sets stage bias", c: "#EF4444", s: "Active" },
            { p: "1", n: "Screening", d: "Export TradingView → Claude builds lifecycle valuation model (13,602 stocks)", c: "#F97316", s: "Complete" },
            { p: "2", n: "Selection", d: "Filter model using macro bias → Claude confirms stages & indicators", c: "#22C55E", s: "In Progress" },
            { p: "3", n: "Technical", d: "Chart + screenshot → Claude builds trade plan (entry/stop/targets)", c: "#8B5CF6", s: "Active" },
            { p: "4", n: "Deep Research", d: "Claude pulls SEC filings, analyst data, competitive landscape, catalysts", c: "#3B82F6", s: "Active" },
            { p: "5", n: "Execution", d: "Trade, track positions, bring updated charts for management", c: "#EC4899", s: "Pending" },
          ].map((ph,i) => (
            <div key={i} style={{ display: "flex", gap: 14, padding: "14px 0", borderBottom: i < 5 ? "1px solid #F1F5F9" : "none" }}>
              <div style={{ width: 38, height: 38, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", background: ph.c+"12", color: ph.c, fontSize: 15, fontWeight: 800, flexShrink: 0 }}>{ph.p}</div>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#0F172A" }}>{ph.n}</span>
                  <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 3, letterSpacing: 0.5,
                    background: ph.s==="Complete" ? "#F0FDF4" : ph.s==="Active" ? "#EFF6FF" : ph.s==="In Progress" ? "#FFF7ED" : "#F8FAFC",
                    color: ph.s==="Complete" ? "#16A34A" : ph.s==="Active" ? "#2563EB" : ph.s==="In Progress" ? "#EA580C" : "#94A3B8"
                  }}>{ph.s}</span>
                </div>
                <div style={{ fontSize: 12, color: "#64748B", marginTop: 3 }}>{ph.d}</div>
              </div>
            </div>
          ))}
          <div style={{ marginTop: 20, padding: "16px 18px", background: "#0F172A", borderRadius: 10 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#F1F5F9", marginBottom: 6 }}>How Updates Work</div>
            <div style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.8 }}>
              This site is updated through Claude chat. I provide a new index.html file → you replace it in your GitHub repo → site updates in ~60 seconds.
              <br/><span style={{color:"#EF4444"}}>•</span> "Here's today's macro dashboard" → regime update
              <br/><span style={{color:"#F97316"}}>•</span> "Add MSFT to watchlist" → new stock card
              <br/><span style={{color:"#22C55E"}}>•</span> "Here's a chart for GLUE" → updated technical setup
              <br/><span style={{color:"#3B82F6"}}>•</span> "Deep dive on NVDA" → new research report
              <br/><span style={{color:"#EC4899"}}>•</span> "GLUE hit T1" → position management update
            </div>
          </div>
        </div>)}

      </div>

      <div style={{ padding: "14px 20px", textAlign: "center", fontSize: 10, color: "#94A3B8", borderTop: "1px solid #E2E8F0", marginTop: 32 }}>
        Lifecycle Research · Built with Claude · Not financial advice · {MACRO_DATA.lastUpdated}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
